    <style>
        :root {
            --bg: #0f0f13;
            --surface: #1a1a24;
            --surface2: #22222f;
            --accent1: #c084fc;
            --accent2: #818cf8;
            --accent3: #f472b6;
            --text: #f1f0f7;
            --text-muted: #8884a8;
            --border: rgba(255,255,255,0.07);
            --user-bubble: linear-gradient(135deg, #7c3aed, #4f46e5);
            --ai-bubble: #1e1e2c;
            --glow: rgba(192, 132, 252, 0.15);
        }

        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            overscroll-behavior: none;
            position: fixed;
            width: 100%;
            height: 100%;
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        #root {
            width: 100%;
            height: 100%;
        }

        /* Noise grain texture overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
            opacity: 0.4;
        }

        /* Ambient glow blobs */
        .ambient-1 {
            position: fixed;
            top: -120px;
            left: -80px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(124,58,237,0.18) 0%, transparent 70%);
            pointer-events: none;
            border-radius: 50%;
        }

        .ambient-2 {
            position: fixed;
            bottom: -100px;
            right: -60px;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(244,114,182,0.12) 0%, transparent 70%);
            pointer-events: none;
            border-radius: 50%;
        }

        @keyframes typingDot {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(192,132,252,0); }
            50% { box-shadow: 0 0 20px 4px rgba(192,132,252,0.2); }
        }

        .msg-enter {
            animation: fadeSlideIn 0.25s ease forwards;
        }

        .typing-dot {
            width: 7px;
            height: 7px;
            background: var(--accent1);
            border-radius: 50%;
            animation: typingDot 1.2s ease-in-out infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; background: var(--accent2); }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; background: var(--accent3); }

        .header-logo-text {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            background: linear-gradient(90deg, #c084fc, #818cf8, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .header-bar {
            background: rgba(15,15,19,0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .send-btn {
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            border: none;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) {
            transform: scale(1.06);
            box-shadow: 0 0 18px rgba(124,58,237,0.5);
        }

        .send-btn:active:not(:disabled) {
            transform: scale(0.94);
        }

        .send-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .input-field {
            flex: 1;
            background: var(--surface2);
            border: 1.5px solid var(--border);
            border-radius: 24px;
            padding: 12px 18px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .input-field::placeholder {
            color: var(--text-muted);
        }

        .input-field:focus {
            border-color: rgba(192,132,252,0.4);
            box-shadow: 0 0 0 3px rgba(192,132,252,0.08);
        }

        .input-bar {
            background: rgba(15,15,19,0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            padding: 12px 16px;
        }

        .user-bubble {
            background: var(--user-bubble);
            color: #fff;
            border-radius: 20px 20px 4px 20px;
            padding: 11px 16px;
            max-width: 78%;
            font-size: 15px;
            line-height: 1.55;
            word-break: break-word;
        }

        .ai-bubble {
            background: var(--ai-bubble);
            color: var(--text);
            border-radius: 20px 20px 20px 4px;
            padding: 11px 16px;
            max-width: 85%;
            font-size: 15px;
            line-height: 1.6;
            border: 1px solid var(--border);
            word-break: break-word;
            white-space: pre-wrap;
        }

        .icon-btn {
            background: rgba(255,255,255,0.07);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.15s ease;
            text-decoration: none;
            color: var(--text);
        }

        .icon-btn:hover {
            background: rgba(255,255,255,0.13);
            transform: scale(1.05);
        }

        .logo-pill {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            border-radius: 12px;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            background: #34d399;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            animation: pulseGlow 2.5s ease infinite;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            scroll-behavior: smooth;
        }

        .messages-area::-webkit-scrollbar {
            width: 4px;
        }
        .messages-area::-webkit-scrollbar-track {
            background: transparent;
        }
        .messages-area::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
        }

        .typing-bubble {
            background: var(--ai-bubble);
            border: 1px solid var(--border);
            border-radius: 20px 20px 20px 4px;
            padding: 14px 18px;
            display: flex;
            gap: 6px;
            align-items: center;
            width: fit-content;
        }

            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [sessionId] = useState(() => `session_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`);

                setMessages([{
                    role: 'assistant',
                    content: "Hey! I'm Sporkal AI — your campus food companion. 🍽️\n\nTell me what's going on. Stressed about an exam? Need something quick between classes? Want to eat healthy or just treat yourself?\n\nI'll figure out the perfect spot for you. What are you feeling right now?"
                }]);
            }, []);

            // Save conversation to localStorage for reflections page
            const saveConversationEntry = (userMessage, aiResponse, userContext) => {
                try {
                    const entry = {
                        sessionId,
                        timestamp: new Date().toISOString(),
                        userMessage,
                        aiResponse,
                        stressLevel: userContext.stressLevel || 'not specified',
                        mealPreference: userContext.mealPreference || 'not specified'
                    };
                    const key = `sporkal_conversations_${sessionId}`;
                    const existing = JSON.parse(localStorage.getItem(key) || '[]');
                    existing.push(entry);
                    localStorage.setItem(key, JSON.stringify(existing));
                } catch (e) {
                    console.error('Save error:', e);
                }
            };

            const analyzeUserContext = (message) => {
                const m = message.toLowerCase();
                return {
                    stressLevel: (m.includes('stress') || m.includes('exam') || m.includes('finals')) ? 'high'
                               : (m.includes('calm') || m.includes('relax')) ? 'low' : 'medium',
                    mealPreference: m.includes('comfort') ? 'comfort' : m.includes('healthy') ? 'healthy' : 'mixed',
                    location: m.includes('wanek') ? 'wanek' : m.includes('slane') ? 'slane' : 'any'
                };
            };

            const buildSystemPrompt = (userContext) => `You are Sporkal AI, a warm and witty food assistant for HPU (High Point University) students. Your job is to help them find the best campus meal for their mood, energy, and situation.

PERSONALITY: Friendly, concise, encouraging. You genuinely care about students' wellbeing.

INTERACTION RULES:
1. Ask ONE brief clarifying question if you need it (location, mood, dietary needs). Don't ask many at once.
2. Once you understand, give ONE specific, confident recommendation.
3. If they reject it, ask what didn't land, then pivot to something completely different.
4. Keep responses to 2–4 sentences max. Be direct.

"Do NOT default to the first items on any list. Consider the full range of options and pick what genuinely fits the student's situation best."

RECOMMENDATION FORMAT:
"You'd love the [ITEM] at [LOCATION] in [BUILDING]. [One sentence why it fits their vibe.] They're open until [TIME]."

REJECTION PIVOT:
"Fair! What didn't appeal to you — [specific thing]? Let me find something better..."

AVAILABLE CAMPUS MENU:

HEALTHY OPTIONS:
${HPU_MENU.healthy.join('\n')}

COMFORT FOODS:
${HPU_MENU.comfort.join('\n')}

LOCATIONS & HOURS:
${HPU_MENU.locations.map(l => `${l.name} (${l.building}): ${l.hours}`).join('\n')}

RULES:
- Only recommend items from the lists above.
- Always include building name.
- ONE recommendation at a time.
- If stressed: lean comfort but optionally mention a balance option.
- Match energy: quick suggestions for time-crunched students.

Student context: stress=${userContext.stressLevel}, preference=${userContext.mealPreference}, area=${userContext.location}`;

            const handleSend = async () => {
                if (!input.trim() || loading) return;

                const userMessage = input.trim();
                setInput('');
                setMessages(prev => [...prev, { role: 'user', content: userMessage }]);
                setLoading(true);

                const userContext = analyzeUserContext(userMessage);

                // Build conversation history for API (exclude initial assistant greeting from history)
                const history = messages.slice(1).map(m => ({
                    role: m.role,
                    content: m.content
                }));

                try {
                    const response = await fetch("/chat", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            systemPrompt: buildSystemPrompt(userContext),
                            messages: history,
                            userMessage: userMessage
                        })
                    });

                    if (!response.ok) {
                        const err = await response.json().catch(() => ({}));
                        throw new Error(err.error?.message || `HTTP ${response.status}`);
                    }

                    const data = await response.json();
                    const reply = data.content?.[0]?.text || "Sorry, I couldn't get a response. Try again!";

                    setMessages(prev => [...prev, { role: 'assistant', content: reply }]);
                    saveConversationEntry(userMessage, reply, userContext);

                } catch (error) {
                    console.error('API Error:', error);
                    // Check if it's a missing API key error
                    const isKeyError = error.message?.includes('401') || error.message?.includes('api_key') || !window.ANTHROPIC_API_KEY;
                    setMessages(prev => [...prev, {
                        role: 'assistant',
                        content: isKeyError
                            ? "⚠️ API key not configured. Set window.ANTHROPIC_API_KEY before using the chat. In the meantime — The Point in Wanek Center is open until midnight if you need a late-night bite!"
                            : "I'm having a moment 😅 Head to The Café in Slane or The Point in Wanek for something great. What sounds good?"
                    }]);
                } finally {
                    setLoading(false);
                }
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSend();
                }
            };

            return (
                <div style={{ width: '100%', height: '100%', display: 'flex', flexDirection: 'column', position: 'relative' }}>

                    {/* Header */}
                    <div className="header-bar" style={{ padding: '12px 16px', flexShrink: 0 }}>
                        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                            <div className="logo-pill">
                                <div className="logo-icon">
                                    <ForkKnifeIcon />
                                </div>
                                <div>
                                    <div className="header-logo-text" style={{ fontSize: '20px' }}>Sporkal AI</div>
                                    <div style={{ fontSize: '11px', color: 'var(--text-muted)', display: 'flex', alignItems: 'center' }}>
                                        <span className="status-dot"></span>
                                        Campus Food Companion
                                    </div>
                                </div>
                            </div>
                            <a href="reflections.html" className="icon-btn" title="Reflections & History">
                                <NotebookIcon />
                            </a>
                        </div>
                    </div>

                    {/* Messages */}
                    <div className="messages-area">
                        {messages.map((msg, idx) => (
                            <div
                                key={idx}
                                className="msg-enter"
                                style={{
                                    display: 'flex',
                                    justifyContent: msg.role === 'user' ? 'flex-end' : 'flex-start',
                                    animationDelay: `${idx * 0.03}s`
                                }}
                            >
                                {msg.role === 'user' ? (
                                    <div className="user-bubble">{msg.content}</div>
                                ) : (
                                    <div className="ai-bubble">{msg.content}</div>
                                )}
                            </div>
                        ))}

                        {loading && (
                            <div style={{ display: 'flex', justifyContent: 'flex-start' }} className="msg-enter">
                                <div className="typing-bubble">
                                    <div className="typing-dot"></div>
                                    <div className="typing-dot"></div>
                                    <div className="typing-dot"></div>
                                </div>
                            </div>
                        )}
                        <div ref={messagesEndRef} />
                    </div>

                    {/* Input */}
                    <div className="input-bar" style={{ display: 'flex', gap: '10px', alignItems: 'center', flexShrink: 0 }}>
                        <input
                            ref={inputRef}
                            type="text"
                            value={input}
                            onChange={(e) => setInput(e.target.value)}
                            onKeyDown={handleKeyDown}
                            placeholder="What are you craving?"
                            className="input-field"
                            disabled={loading}
                        />
                        <button
                            className="send-btn"
                            onClick={handleSend}
                            disabled={loading || !input.trim()}
                        >
                            <SendIcon />
                        </button>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<SporkalChat />, document.getElementById('root'));
    </script>
</body>
</html>
