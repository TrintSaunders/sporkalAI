    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a3a5c">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <style>
        :root {
            --bg: #0f0f13;
            --surface: #1a1a24;
            --surface2: #22222f;
            --accent1: #c084fc;
            --accent2: #818cf8;
            --accent3: #f472b6;
            --text: #f1f0f7;
            --text-muted: #8884a8;
            --border: rgba(255,255,255,0.07);
            --user-bubble: linear-gradient(135deg, #7c3aed, #4f46e5);
            --ai-bubble: #1e1e2c;
        }

        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /*
         * KEY FIX: Use 100dvh (dynamic viewport height).
         * dvh shrinks automatically when the soft keyboard opens on mobile,
         * so the entire layout compresses to fit the visible area — exactly
         * like iMessage. No JavaScript needed for this behavior.
         *
         * The meta viewport tag also includes:
         *   interactive-widget=resizes-content
         * which tells the browser to resize the layout (not just scroll/overlay)
         * when the virtual keyboard appears. This is the modern standard approach.
         */
        html, body {
            height: 100%;
            /* Prevent any scrolling on the root — the messages area handles its own scroll */
            overflow: hidden;
            background: var(--bg);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
        }

        #root {
            width: 100%;
            height: 100%;
        }

        /* Noise grain texture overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
            opacity: 0.4;
        }

        .ambient-1 {
            position: fixed;
            top: -120px;
            left: -80px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(124,58,237,0.18) 0%, transparent 70%);
            pointer-events: none;
            border-radius: 50%;
        }

        .ambient-2 {
            position: fixed;
            bottom: -100px;
            right: -60px;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(244,114,182,0.12) 0%, transparent 70%);
            pointer-events: none;
            border-radius: 50%;
        }

        @keyframes typingDot {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(192,132,252,0); }
            50% { box-shadow: 0 0 20px 4px rgba(192,132,252,0.2); }
        }

        @keyframes spinRefresh {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        @keyframes ptr-drop {
            from { opacity: 1; transform: translateX(-50%) translateY(12px) scale(1); }
            to   { opacity: 0; transform: translateX(-50%) translateY(-24px) scale(0.75); }
        }

        .ptr-indicator {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%) translateY(-60px);
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(30,20,50,0.85);
            border: 1px solid rgba(192,132,252,0.3);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 7px 16px 7px 10px;
            font-size: 12px;
            font-family: 'DM Sans', sans-serif;
            color: var(--accent1);
            white-space: nowrap;
            pointer-events: none;
            z-index: 200;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .ptr-indicator.pulling {
            transform: translateX(-50%) translateY(12px);
        }

        .ptr-indicator.refreshing {
            transform: translateX(-50%) translateY(12px);
        }

        .ptr-indicator.refreshing .ptr-icon {
            animation: spinRefresh 0.65s linear infinite;
        }

        .ptr-indicator.done {
            animation: ptr-drop 0.35s ease forwards;
        }

        .ptr-icon {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        .msg-enter {
            animation: fadeSlideIn 0.25s ease forwards;
        }

        .typing-dot {
            width: 7px;
            height: 7px;
            background: var(--accent1);
            border-radius: 50%;
            animation: typingDot 1.2s ease-in-out infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; background: var(--accent2); }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; background: var(--accent3); }

        .header-logo-text {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            background: linear-gradient(90deg, #c084fc, #818cf8, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .header-bar {
            background: rgba(15,15,19,0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 12px 16px;
            /* Never shrink — header stays full size */
            flex-shrink: 0;
        }

        .send-btn {
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            border: none;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) {
            transform: scale(1.06);
            box-shadow: 0 0 18px rgba(124,58,237,0.5);
        }

        .send-btn:active:not(:disabled) { transform: scale(0.94); }
        .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

        .input-field {
            flex: 1;
            background: var(--surface2);
            border: 1.5px solid var(--border);
            border-radius: 24px;
            padding: 12px 18px;
            font-family: 'DM Sans', sans-serif;
            font-size: 16px; /* 16px prevents iOS auto-zoom */
            color: var(--text);
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            /* Textarea-specific */
            resize: none;
            overflow: hidden;
            line-height: 1.5;
            min-height: 46px;
            max-height: 140px;
            overflow-y: auto;
            display: block;
        }

        .input-field::placeholder { color: var(--text-muted); }

        .input-field:focus {
            border-color: rgba(192,132,252,0.4);
            box-shadow: 0 0 0 3px rgba(192,132,252,0.08);
        }

        /*
         * KEY FIX: Input bar is NO LONGER position:fixed.
         * It sits at the bottom of the flex column naturally.
         * When dvh shrinks (keyboard opens), this bar rides up with it,
         * sitting right on top of the keyboard — just like iMessage.
         *
         * safe-area-inset-bottom handles the iPhone home indicator
         * notch area when the keyboard is NOT open.
         */
        .input-bar {
            background: rgba(15,15,19,0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            /* No safe-area-inset-bottom here — dvh already excludes the home
               indicator zone when keyboard is closed, and when the keyboard is
               open iOS shrinks dvh to the exact visible area so there's nothing
               extra to account for. Adding safe-area here causes the phantom
               gap / double-offset bug. */
            padding: 10px 16px 10px;
            flex-shrink: 0;
        }

        .user-bubble {
            background: var(--user-bubble);
            color: #fff;
            border-radius: 20px 20px 4px 20px;
            padding: 11px 16px;
            max-width: 78%;
            font-size: 15px;
            line-height: 1.55;
            word-break: break-word;
        }

        .ai-bubble {
            background: var(--ai-bubble);
            color: var(--text);
            border-radius: 20px 20px 20px 4px;
            padding: 11px 16px;
            max-width: 85%;
            font-size: 15px;
            line-height: 1.6;
            border: 1px solid var(--border);
            word-break: break-word;
            white-space: pre-wrap;
        }

        .icon-btn {
            background: rgba(255,255,255,0.07);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.15s ease;
            text-decoration: none;
            color: var(--text);
        }

        .icon-btn:hover {
            background: rgba(255,255,255,0.13);
            transform: scale(1.05);
        }

        .logo-pill { display: flex; align-items: center; gap: 10px; }

        .logo-icon {
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            border-radius: 12px;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            background: #34d399;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            animation: pulseGlow 2.5s ease infinite;
        }

        /*
         * KEY FIX: Messages area uses flex:1 with min-height:0.
         * min-height:0 is critical — without it, a flex child won't
         * shrink below its content size, breaking the scroll.
         * overflow-y:auto enables independent scrolling so you can
         * scroll up to older messages while the keyboard is open.
         */
        .messages-area-wrapper {
            flex: 1;
            min-height: 0;
            position: relative;
            /* overflow visible so PTR indicator can peek above, clipping handled by messages-area */
            overflow: visible;
        }

        .messages-area {
            width: 100%;
            height: 100%;
            overflow-y: scroll; /* scroll not auto — auto can freeze on iOS when keyboard opens */
            -webkit-overflow-scrolling: touch;
            /* NOT overscroll-behavior:contain — that suppresses touch scroll when keyboard is up on iOS */
            overscroll-behavior-y: none;
            padding: 16px 14px 16px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            gap: 10px;
        }

        .messages-area::-webkit-scrollbar { width: 4px; }
        .messages-area::-webkit-scrollbar-track { background: transparent; }
        .messages-area::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
        }

        .typing-bubble {
            background: var(--ai-bubble);
            border: 1px solid var(--border);
            border-radius: 20px 20px 20px 4px;
            padding: 14px 18px;
            display: flex;
            gap: 6px;
            align-items: center;
            width: fit-content;
        }

        /*
         * KEY FIX: chat-wrapper uses 100dvh instead of fixed positioning.
         *
         * dvh = dynamic viewport height. On mobile browsers this value
         * automatically updates when the soft keyboard opens or closes,
         * shrinking to the visible area height. This is what gives us
         * the iMessage-style "keyboard pushes content up" behavior.
         *
         * The flex column means: header + scrollable messages + input bar
         * all stack and share the available space. When dvh shrinks,
         * messages-area shrinks (it's flex:1), header and input-bar don't.
         */
        .chat-wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
            /* 100dvh = dynamic viewport height. Shrinks when soft keyboard opens.
               This is the core of the iMessage-style behavior. */
            height: 100dvh;
            /* Fallback for older browsers that don't support dvh */
            height: 100svh;
        }

        /* iOS-specific: when running as a saved-to-homescreen PWA, add top
           padding so content isn't hidden behind the status bar notch */
        @supports (padding-top: env(safe-area-inset-top)) {
            .header-bar {
                padding-top: calc(12px + env(safe-area-inset-top));
            }
        }
    </style>

                "Sunshine Cafe – French Toast",
                "Sunshine Cafe – Jumbo Cinnamon Roll",
                "Sunshine Cafe – Fried Chicken Biscuit",
                "Sunshine Cafe – Spiced Honey Chicken Biscuit",
                "Chick-fil-A – Chicken Biscuit",
                "Chick-fil-A – Spicy Chicken Biscuit",
                "Chick-fil-A – Bacon Egg and Cheese Biscuit",
                "Chick-fil-A – Sausage Biscuit",
                "Chick-fil-A – Chick-n-Minis",
                "Chick-fil-A – Hash Browns"
            ],
            locations: [
                { name: "Great Day Bakery", building: "Wanek Center", hours: "7am–9pm daily" },
                { name: "Silver Line Diner", building: "Silver Line", hours: "7am–10pm daily" },
                { name: "Village Grille", building: "Village", hours: "11am–10pm daily" },
                { name: "The Point", building: "Wanek Center", hours: "11am–11:59pm daily" },
                { name: "Market at Yadkin Grill", building: "Yadkin Residence Hall", hours: "11am–9pm daily" },
                { name: "Slane Starbucks", building: "Slane Student Center", hours: "7am–9pm daily" },
                { name: "Butterfly", building: "Conservatory", hours: "7am–5pm daily" },
                { name: "Subway", building: "Slane Student Center", hours: "10am–9pm daily" },
                { name: "Barberitos", building: "Panther Commons", hours: "11am–9pm daily" },
                { name: "Purple Pie", building: "Panther Commons", hours: "11am–10pm daily" },
                { name: "Village Juice", building: "Slane Student Center", hours: "7am–8pm daily" },
                { name: "Sunshine Cafe", building: "Parking Deck", hours: "7am–6pm daily" },
                { name: "Farmers Market", building: "Wanek Center", hours: "7am–8pm daily" },
                { name: "Jamba Juice", building: "Wanek Center", hours: "10am–8pm daily" },
                { name: "Chick-fil-A", building: "Panther Commons", hours: "7am–9pm daily" }
            ]
        };

        const SendIcon = () => (
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
        );

        const ForkKnifeIcon = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/>
                <path d="M7 2v20"/>
                <path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/>
            </svg>
        );

        const NotebookIcon = () => (
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
            </svg>
        );

        const SporkalChat = () => {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [sessionId] = useState(() => `session_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`);
            const messagesAreaRef = useRef(null);
            const inputRef = useRef(null);
            const inputBarRef = useRef(null);
            const ptrIndicatorRef = useRef(null);
            const ptrState = useRef({ startY: 0, dragging: false, phase: 'idle' });
            const [ptrPhase, setPtrPhase] = useState('idle'); // idle | pulling | releasing | refreshing | done

            // Lightweight iOS Safari correction.
            // dvh handles 95% of keyboard behavior, but iOS Safari has a brief
            // window during keyboard animation where dvh hasn't updated yet.
            // This listener catches that gap and nudges the input bar to the
            // correct position, then removes itself once dvh catches up.
            useEffect(() => {
                const vv = window.visualViewport;
                if (!vv) return;

                const onResize = () => {
                    if (!inputBarRef.current) return;
                    const gap = window.innerHeight - vv.height - vv.offsetTop;
                    // Only apply correction if there's a meaningful gap
                    // (i.e. keyboard is in the middle of animating open/closed)
                    inputBarRef.current.style.marginBottom = gap > 0 ? `${gap}px` : '0px';
                };

                vv.addEventListener('resize', onResize);
                vv.addEventListener('scroll', onResize);
                return () => {
                    vv.removeEventListener('resize', onResize);
                    vv.removeEventListener('scroll', onResize);
                };
            }, []);

            // Pull-to-refresh logic
            useEffect(() => {
                const el = messagesAreaRef.current;
                if (!el) return;
                const THRESHOLD = 72; // px of pull needed to trigger refresh
                const SCROLL_TOLERANCE = 2; // px rounding buffer

                const onTouchStart = (e) => {
                    // Only arm PTR when scrolled to the very top of the conversation
                    if (el.scrollTop > SCROLL_TOLERANCE) {
                        ptrState.current = { startY: 0, dragging: false, phase: 'idle' };
                        return;
                    }
                    ptrState.current = { startY: e.touches[0].clientY, dragging: true, phase: 'idle' };
                };

                const onTouchMove = (e) => {
                    if (!ptrState.current.dragging) return;
                    if (el.scrollTop > SCROLL_TOLERANCE) {
                        ptrState.current.dragging = false;
                        setPtrPhase('idle');
                        return;
                    }
                    const dy = e.touches[0].clientY - ptrState.current.startY;
                    if (dy <= 0) {
                        ptrState.current.dragging = false;
                        setPtrPhase('idle');
                        return;
                    }
                    e.preventDefault();
                    const phase = dy >= THRESHOLD ? 'releasing' : 'pulling';
                    ptrState.current.phase = phase;
                    setPtrPhase(phase);
                };

                const onTouchEnd = () => {
                    if (!ptrState.current.dragging) return;
                    ptrState.current.dragging = false;
                    if (ptrState.current.phase === 'releasing') {
                        setPtrPhase('refreshing');
                        // Small delay so user sees the spinner, then reload
                        setTimeout(() => {
                            setPtrPhase('done');
                            setTimeout(() => window.location.reload(), 320);
                        }, 600);
                    } else {
                        setPtrPhase('idle');
                    }
                };

                el.addEventListener('touchstart', onTouchStart, { passive: true });
                el.addEventListener('touchmove', onTouchMove, { passive: false });
                el.addEventListener('touchend', onTouchEnd);
                return () => {
                    el.removeEventListener('touchstart', onTouchStart);
                    el.removeEventListener('touchmove', onTouchMove);
                    el.removeEventListener('touchend', onTouchEnd);
                };
            }, []);

            const scrollToBottom = () => {
                const el = messagesAreaRef.current;
                if (!el) return;
                el.scrollTop = el.scrollHeight;
            };

            // Scroll to bottom when messages change or typing indicator appears
            useEffect(() => {
                scrollToBottom();
            }, [messages, loading]);

            // On input focus (keyboard opens), scroll to bottom after a short
            // delay to let the dvh resize complete its animation
            useEffect(() => {
                const input = inputRef.current;
                if (!input) return;
                const onFocus = () => {
                    setTimeout(() => scrollToBottom('instant'), 120);
                };
                input.addEventListener('focus', onFocus);
                return () => input.removeEventListener('focus', onFocus);
            }, []);

            // Initial greeting
            useEffect(() => {
                setMessages([{
                    role: 'assistant',
                    content: "Hey! I'm Sporkal AI — your campus food companion. 🍽️\n\nTell me what's going on. Stressed about an exam? Need something quick between classes? Want to eat healthy or just treat yourself?\n\nI'll figure out the perfect spot for you. What are you feeling right now?"
                }]);
            }, []);

            const saveConversationEntry = (userMessage, aiResponse, userContext) => {
                try {
                    const entry = {
                        sessionId,
                        timestamp: new Date().toISOString(),
                        userMessage,
                        aiResponse,
                        stressLevel: userContext.stressLevel || 'not specified',
                        mealPreference: userContext.mealPreference || 'not specified'
                    };
                    const key = `sporkal_conversations_${sessionId}`;
                    const existing = JSON.parse(localStorage.getItem(key) || '[]');
                    existing.push(entry);
                    localStorage.setItem(key, JSON.stringify(existing));
                } catch (e) {
                    console.error('Save error:', e);
                }
            };

            const analyzeUserContext = (message) => {
                const m = message.toLowerCase();
                return {
                    stressLevel: (m.includes('stress') || m.includes('exam') || m.includes('finals')) ? 'high'
                               : (m.includes('calm') || m.includes('relax')) ? 'low' : 'medium',
                    mealPreference: m.includes('comfort') ? 'comfort' : m.includes('healthy') ? 'healthy' : 'mixed',
                    location: m.includes('wanek') ? 'wanek' : m.includes('slane') ? 'slane' : 'any'
                };
            };

            const buildSystemPrompt = (userContext) => `You are Sporkal AI, a warm and witty food assistant for HPU (High Point University) students. Your job is to help them find the best campus meal for their mood, energy, and situation.

PERSONALITY: Friendly, concise, encouraging. You genuinely care about students' wellbeing.

INTERACTION RULES:
1. Ask ONE brief clarifying question if you need it (location, mood, dietary needs). Don't ask many at once.
2. Once you understand, give ONE specific, confident recommendation.
3. If they reject it, ask what didn't land, then pivot to something completely different.
4. Keep responses to 2–4 sentences max. Be direct.

Do NOT default to the first items on any list. Consider the full range of options and pick what genuinely fits the student's situation best.

RECOMMENDATION FORMAT:
"You'd love the [ITEM] at [LOCATION] in [BUILDING]. [One sentence why it fits their vibe.] They're open until [TIME]."

REJECTION PIVOT:
"Fair! What didn't appeal to you — [specific thing]? Let me find something better..."

AVAILABLE CAMPUS MENU:

HEALTHY OPTIONS:
${HPU_MENU.healthy.join('\n')}

COMFORT FOODS:
${HPU_MENU.comfort.join('\n')}

LOCATIONS & HOURS:
${HPU_MENU.locations.map(l => `${l.name} (${l.building}): ${l.hours}`).join('\n')}

RULES:
- Only recommend items from the lists above.
- Always include building name.
- ONE recommendation at a time.
- If stressed: lean comfort but optionally mention a balance option.
- Match energy: quick suggestions for time-crunched students.

Student context: stress=${userContext.stressLevel}, preference=${userContext.mealPreference}, area=${userContext.location}`;

            const handleSend = async () => {
                if (!input.trim() || loading) return;

                const userMessage = input.trim();
                setInput(''); if (inputRef.current) { inputRef.current.style.height = 'auto'; }
                setMessages(prev => [...prev, { role: 'user', content: userMessage }]);
                setLoading(true);

                const userContext = analyzeUserContext(userMessage);
                const history = messages.slice(1).map(m => ({ role: m.role, content: m.content }));

                try {
                    const response = await fetch("/chat", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            systemPrompt: buildSystemPrompt(userContext),
                            messages: history,
                            userMessage: userMessage
                        })
                    });

                    if (!response.ok) {
                        const err = await response.json().catch(() => ({}));
                        throw new Error(err.error?.message || `HTTP ${response.status}`);
                    }

                    const data = await response.json();
                    const reply = data.reply || "Sorry, I couldn't get a response. Try again!";
                    setMessages(prev => [...prev, { role: 'assistant', content: reply }]);
                    saveConversationEntry(userMessage, reply, userContext);

                } catch (error) {
                    console.error('API Error:', error);
                    setMessages(prev => [...prev, {
                        role: 'assistant',
                        content: "I'm having a moment 😅 Head to The Café in Slane or The Point in Wanek for something great. What sounds good?"
                    }]);
                } finally {
                    setLoading(false);
                }
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSend();
                }
            };

            return (
                <div className="chat-wrapper">
                    {/* Header */}
                    <div className="header-bar">
                        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                            <div className="logo-pill">
                                <div className="logo-icon"><ForkKnifeIcon /></div>
                                <div>
                                    <div className="header-logo-text" style={{ fontSize: '20px' }}>Sporkal AI</div>
                                    <div style={{ fontSize: '11px', color: 'var(--text-muted)', display: 'flex', alignItems: 'center' }}>
                                        <span className="status-dot"></span>
                                        Campus Food Companion
                                    </div>
                                </div>
                            </div>
                            <a href="reflections.html" className="icon-btn" title="Reflections & History">
                                <NotebookIcon />
                            </a>
                        </div>
                    </div>

                    {/* Messages — wrapper provides relative positioning for PTR indicator */}
                    <div className="messages-area-wrapper">
                        {/* Pull-to-refresh indicator */}
                        <div ref={ptrIndicatorRef} className={"ptr-indicator" + (ptrPhase !== 'idle' ? ' ' + ptrPhase : '')}>
                            <svg className="ptr-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                                {ptrPhase === 'refreshing' || ptrPhase === 'done'
                                    ? <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
                                    : <path d="M12 5v14M5 12l7-7 7 7"/>
                                }
                            </svg>
                            {ptrPhase === 'refreshing' ? 'Refreshing…'
                             : ptrPhase === 'done' ? 'Done!'
                             : ptrPhase === 'releasing' ? 'Release to refresh'
                             : 'Pull to refresh'}
                        </div>
                        <div ref={messagesAreaRef} className="messages-area">
                        {/* Pushes messages to bottom when chat is short, collapses when full */}
                        <div style={{ flex: 1 }} />
                        {messages.map((msg, idx) => (
                            <div key={idx} className="msg-enter" style={{
                                display: 'flex',
                                justifyContent: msg.role === 'user' ? 'flex-end' : 'flex-start',
                                animationDelay: `${idx * 0.03}s`
                            }}>
                                {msg.role === 'user'
                                    ? <div className="user-bubble">{msg.content}</div>
                                    : <div className="ai-bubble">{msg.content}</div>
                                }
                            </div>
                        ))}
                        {loading && (
                            <div style={{ display: 'flex', justifyContent: 'flex-start' }} className="msg-enter">
                                <div className="typing-bubble">
                                    <div className="typing-dot"></div>
                                    <div className="typing-dot"></div>
                                    <div className="typing-dot"></div>
                                </div>
                            </div>
                        )}
                        </div>{/* end messages-area */}
                    </div>{/* end messages-area-wrapper */}

                    {/* Input — sits naturally at bottom of flex column, rises with keyboard */}
                    <div ref={inputBarRef} className="input-bar" style={{ display: 'flex', gap: '10px', alignItems: 'flex-end' }}>
                        <textarea
                            ref={inputRef}
                            value={input}
                            rows={1}
                            onChange={(e) => {
                                setInput(e.target.value);
                                // Auto-resize: reset height then grow to scrollHeight
                                e.target.style.height = 'auto';
                                e.target.style.height = Math.min(e.target.scrollHeight, 140) + 'px';
                            }}
                            onKeyDown={handleKeyDown}
                            placeholder="What are you craving?"
                            className="input-field"
                            disabled={loading}
                        />
                        <button className="send-btn" onClick={handleSend} disabled={loading || !input.trim()}>
                            <SendIcon />
                        </button>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<SporkalChat />, document.getElementById('root'));
    </script>
</body>
